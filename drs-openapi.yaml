      responses:
        '200':
          description: Successful operation
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
      operationId: post-voucher-redeem
      x-stoplight:
        id: xasro8ur97dkn
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth: # arbitrary name for the security scheme
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Pagelength:
      name: pageLength
      in: query
      description: |
        Number of records to return. 
        Values that are above max will be trimmed to max <br>
        Min: 0 <br>
        Max: 50
      min: 0
      max: 50
      schema:
        type: number
    Startindex:
      name: startIndex
      in: query
      description: Start index for paging
      schema:
        type: number
    id:
      name: id
      in: path
      required: true
      description: |
        Unique ID of RVM
      schema:
        type: string
    rvmId:
      name: rvmId
      description: id of a RVM machine
      in: query
      required: true
      schema:
        type: string
  schemas:
    ApiException:
      title: ApiException
      x-stoplight:
        id: je3kztlbezwpl
      type: object
      properties:
        httpStatus:
          type: integer
          format: int32
          example: 400
        errorType:
          type: string
          example: api.err.type.validation
        path:
          type: string
          example: POST /transaction/
        objectId:
          type: string
          example: 497f6eca-6276-4993-bfeb-53cbbbba6f08
          description: ID of the object for which the error occurred
        errorMsg:
          type: array
          items:
            $ref: '#/components/schemas/ErrorMsg'
    RedeemType:
      title: RedeemType
      x-stoplight:
        id: zl59bi4je1cpy
      type: number
      enum:
        - 1
        - 2
        - 3
        - 99
      description: |
        Descriptor for Reedem Type where <br>
          - 1 - Exchanged For Cash
          - 2 - Discount on bill
          - 3 - Charity
          - 99 - Other
    Voucher:
      title: Voucher
      x-stoplight:
        id: xycd2rl0p4qwm
      type: object
      required:
        - id
        - redeemType
        - redeemDate
      properties:
        id:
          type: string
          description: Id of a voucher
          x-stoplight:
            id: oxadjinwkm40p
        redeemType:
          $ref: '#/components/schemas/RedeemType'
        redeemDate:
          type: string
          format: date-time
        rvmId:
          type: string
          format: guid
    ErrorMsg:
      title: ErrorMsg
      x-stoplight:
        id: mkkp4hygj6eod
      type: object
      properties:
        errorCode:
          type: string
          example: TRS_PRODUCT_BAD_STATUS
          description: Error code
        field:
          type: string
          example: containers.ean
          description: Field to which the error applies
        idRow:
          type: integer
          format: int32
          example: 2
          description: Index of the 1st-level list element the error applies to (e.g. the 14th element of the `transaction` list)
        idRow2:
          type: integer
          format: int32
          example: 9
          description: Index of the 2nd-level list element the error applies to (e.g. the 9th element of the `items` list)
        errorMsgLabel:
          type: string
          example: api.err.msg.trs.product.bad.status
          description: 'Label in the multilingual file with the corresponding error message. If there are variables to be substituted, they are contained in tags {{0}}, {{1}}, {{2}}, etc.'
        errorMsgArgs:
          type: array
          description: 'List of values to be substituted into the above-mentioned tags {{0}}, {{1}}, {{2}}, etc.'
          items:
            type: string
            example: INACTIVE
            description: Element of the list of values to be substituted into the above-mentioned tags
    BagSeal:
      type: object
      required:
        - sealNumber
        - bagId
        - sealTime
      properties:
        lockingPersonId:
          type: string
          format: uuid
        sealNumber:
          type: string
        bagId:
          type: string
          format: uuid
        sealTime:
          type: string
          format: date-time
      x-stoplight:
        id: cyqmwjxrizrej
    BagFillStatus:
      type: object
      properties:
        rvmId:
          type: string
          format: uuid
        binNo:
          type: number
          example: 1
          description: |
            (Optional) ID of bin that is filled out
        wasteType:
          type: array
          items:
            $ref: models/enum/WasteTypeEnum.yaml
        rvmBlocked:
          type: boolean
          example: false
          description: Defines whether Rvm was blocked from further usage
        fillLevelPercent:
          type: number
          format: float
          example: 0.8
          description: 'Fill level in percent (e.g., 0.8 for 80%)'
        reportedAt:
          type: string
          format: date-time
      required:
        - rvmId
        - wasteType
        - fillLevelPercent
        - rvmBlocked
        - reportedAt
    BagReplacement:
      type: object
      x-stoplight:
        id: ty6l3ytww8zew
      required:
        - bagId
        - binNo
        - rvmId
        - replacementDate
        - containers
      properties:
        bagId:
          type: string
          format: uuid
          description: "Bag ID in UUID format. \r\nGiven by the RVM provider and visible to the client (Collection Point) in the DRS system."
        binNo:
          type: numeric
          example: 1
          description: Descriptior which bin is being emptied
        rvmId:
          type: string
          format: uuid
          description: "Set during the registration of the machine in\r\n[POST - /machine](https://kaucja.stoplight.io/docs/rvm-api/bu3ambgd8l19t-add-machine-update-by-rvm-vendor).\r\n<br>Either sent in the registration request, or returned in the response - as **id**"
        sealNumber:
          type: string
          example: '017824770475060'
          description: |
            Optional. If RVM is able to seal bag on it's own it should send us seal number on this particular call. If sent in a request, is subject to checksum verification on Kaucja's side.
        lockingPersonId:
          type: string
          format: uuid
        replacementDate:
          type: string
          format: date-time
        bagWeight:
          type: number
          description: Weight of the bag in kilograms (kg)
        containerAmount:
          type: integer
        relatedTransactionsIds:
          type: array
          description: "Optional but **highly preferable**. Enables the customer (Colelction Point)\r\nto preview all of the transactions that a closed bag consists of."
          items:
            type: string
            format: uuid
        containers:
          type: array
          items:
            $ref: models/ContainerFull.yaml
    BulkTransaction:
      title: BulkTransaction
      x-stoplight:
        id: 5g2jzhz7bryao
      type: array
      items:
        $ref: models/Transaction.yaml
    BulkTransactionConfirmation:
      title: Bulk Transaction Confrimation
      type: array
      items:
        allOf:
          - properties:
              transactionId:
                type: string
                format: uuid
                description: Unique ID of the transaction
          - $ref: '#/components/schemas/TransactionConfirmation'
    TransactionConfirmation:
      title: Transaction Confirmation
      x-stoplight:
        id: l9yurkyx2wr88
      type: object
      properties:
        blocked:
          type: boolean
          default: false
          description: Indicates whether the transaction is blocked from payment by RVM
        amount:
          type: number
          example: 10.5
          description: Amount to be paid by RVM for the returned bottles
        currency:
          type: string
          default: PLN
          description: Currency in which RVM pays for returned bottles
    MachineUpdate:
      title: Machine Update
      description: |
        Model representing what RVM provider can update in machines that are being stored in DRS
      x-stoplight:
        id: zk239eslozgw8
      allOf:
        - $ref: models/PostMachine.yaml
        - required:
            - drsCpNo
          properties:
            id:
              type: string
              description: "Unique machine identifier in the DRS. This value is required later when sending transactions and closing bags, where it's reffered to as **rvmId**. \r\n\r\nIf omitted in this request, DRS will generate the id and return it in the response."
              format: uuid
            model:
              type: string
              example: Tomra 9
            drsCpNo:
              description: 'Number of the Collection Point created by the client (the owner of the Collection Point) in the DRS system, example: 1100061-152.'
      x-examples:
        Example 1:
          serialNumber: 148d7a56-176d-413b-9eb5-c62f6f5bb67a
          name: string
          bins:
            - wasteType:
                - 1
              litrage: 240
          id: string
          model: Tomra 9
          drsCpNo: null
      type: object
    RegisterMachine:
      title: RegisterMachine
      x-stoplight:
        id: pavk7ohndqzt1
      type: object
      required:
        - rvmModel
      allOf:
        - $ref: models/PostMachine.yaml
        - properties:
            id:
              type: string
              format: uuid
              description: ID of machine
            rvmModel:
              type: string
              format: uuid
              description: Model of RVM that is used.
            authorizationCode:
              type: string
              description: Authorization code required to register machine
    VoucherData:
      title: VoucherData
      x-stoplight:
        id: ato1zk3jv1nrl
      type: object
      properties:
        id:
          type: string
          x-stoplight:
            id: 44s2k53bhg2hz
        printType:
          $ref: '#/components/schemas/VocuherPrintTypeEnum'
        issuedAt:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time
    VocuherPrintTypeEnum:
      title: VoucherPrintTypeEnum
      x-stoplight:
        id: wjgw9ypmmrjlh
      type: integer
      enum:
        - 0
        - 1
      description: |
        Decscriptor for Voucher Type where
          - 0 - Code128/EAN13 type - Barcode
          - 1 - QR Code
    MachineUpdateConnected:
      title: MachineUpdateConnected
      x-stoplight:
        id: jl86dv966rdag
      type: object
      required:
        - serialNumber
        - bins
      properties:
        id:
          type: string
          description: "Unique machine identifier in the DRS. This value is required later when sending transactions and closing bags, where it's reffered to as **rvmId**. \r\n\r\nIf omitted in this request, DRS will generate the id and return it in the response."
          format: uuid
        serialNumber:
          type: string
          description: Serial number of a machine
          x-stoplight:
            id: 8pp4kxobuhvlh
        connectedWith:
          type: uuid
          description: ID of machine that shares the same bin
        name:
          type: string
          description: "RVM Customer/provider given name. Visible on the customer's \r\n(Collection Point's) side in the DRS portal. "
        model:
          type: string
          example: Tomra 9
    VoucherBuffer:
      title: VoucherBuffer
      x-stoplight:
        id: mii4730sid7h4
      type: object
      properties:
        voucherIdList:
          items:
            type: string
            example: 20012312312
        printType:
          $ref: '#/components/schemas/VocuherPrintTypeEnum'
        daysUntilExpiration:
          description: Parameter saying how long voucher will be valid after issuing it by RVM
          type: string
          example: 30d
    TransactionRequest:
      type: object
      required:
        - id
        - totalAmount
        - transactionStartTime
        - transactionEndTime
        - containers
      properties:
        id:
          type: string
          format: uuid
          description: Unique transaction identifier.
          example: "497f6eca-6276-4993-bfeb-53cbbbba6f08"
        cstId:
          type: string
          format: uuid
          nullable: true
          description: POS stand identifier. Mutually exclusive with rvmId.
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        rvmId:
          type: string
          format: uuid
          nullable: true
          description: RVM machine identifier. Mutually exclusive with cstId.
          example: "313ba123-cb88-44be-98e6-0b326b105a2a"
        posId:
          type: string
          nullable: true
          description: Optional POS terminal identifier.
          example: "POS-001"
        value:
          type: number
          nullable: true
          description: Total deposit value in PLN.
          example: 10.0
        totalAmount:
          type: number
          description: Total number of containers accepted in the transaction.
          example: 20
        transactionStartTime:
          type: string
          format: date-time
          description: Transaction start time.
          example: "2025-03-20T10:00:00Z"
        transactionEndTime:
          type: string
          format: date-time
          description: Transaction end time.
          example: "2025-03-20T10:05:00Z"
        voucher:
          $ref: '#/components/schemas/VoucherInput'
        containers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ContainerItem'

    VoucherInput:
      type: object
      nullable: true
      description: Voucher data for existing or new voucher handling.
      properties:
        id:
          type: string
          description: Existing voucher identifier.
          example: "VCH-001"
        redeemed:
          type: boolean
          description: Whether the voucher has already been redeemed.
          example: true
        redeemType:
          type: integer
          enum:
            - 0
            - 1
            - 2
            - 3
            - 98
            - 99
          description: Voucher redemption type.
          example: 0

    ContainerItem:
      type: object
      required:
        - ean
        - count
      properties:
        ean:
          type: string
          description: Container EAN code.
          example: "20123123"
        count:
          type: integer
          minimum: 1
          description: Number of containers with the given EAN.
          example: 15
        weight:
          type: number
          nullable: true
          description: Container weight in grams.
          example: 28.5
        rejectionCauseCode:
          type: integer
          nullable: true
          description: Rejection cause code.
          example: 3

    VoucherResponse:
      type: object
      required:
        - id
        - printType
      description: Voucher data returned by the voucher service.
      properties:
        id:
          type: string
          description: Identifier of the issued or updated voucher.
          example: "VCH-20250320-0042"
        printType:
          type: integer
          description: Voucher print type.
          example: 1
        issuedAt:
          type: string
          format: date-time
          description: Voucher issue date and time.
          example: "2025-03-20T10:05:01Z"
        validUntil:
          type: string
          format: date-time
          description: Voucher expiration date.
          example: "2025-04-20T23:59:59Z"

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Error description.
          example: "Either cstId or rvmId must be provided"
        errors:
          type: array
          description: DTO validation error details.
          items:
            type: object
            additionalProperties:
              type: string
  responses:
    '400':
      description: 'REQUIRED - One or more required fields has not been provided <br>ENUM_ERROR - Format of one or more fields is incorrect <br>INCONSISTENT - Value is inconsistent comparing to ether system elements <br>TOO_LONG - Exceeded maximum length <br>INCORRECT_FORMAT - Incorrect format <br>VALUE_TOO_HIGH - Exceeded maximum value <br>VALUE_TOO_LOW - Value is below minimum allowed <br>...  '
      content:
        '*/*':
          schema:
            $ref: '#/components/schemas/ApiException'
    '401':
      description: UNAUTHORIZED - api.err.msg.unauthorized
      content:
        '*/*':
          schema:
            $ref: '#/components/schemas/ApiException'
    '403':
      description: FORBIDDEN - api.err.msg.forbidden
      content:
        '*/*':
          schema:
            $ref: '#/components/schemas/ApiException'
    '404':
      description: NOT_FOUND - Resource not found
      content:
        '*/*':
          schema:
            $ref: '#/components/schemas/ApiException'
    '500':
      description: INTERNAL - Internal error has occurred
      content:
        '*/*':
          schema:
            $ref: '#/components/schemas/ApiException'
    200PostReturnId:
      description: OK
      content:
        application/json:
          schema:
            properties:
              id:
                type: string
    400ValidationFailed:
      description: Example response
      content:
        application/json:
          schema:
            $ref: models/ErrorMessage.yaml
    409Conflict:
      description: Example response
      content:
        application/json:
          schema:
            $ref: models/ErrorMessage.yaml
          examples: null
    200TransactionProcessed:
      description: |
        Response returned by transaction.
        Indicates whether coupon should be granted and for what amount. 
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TransactionConfirmation'
    200BulkTransactionProcessed:
      description: |
        Response returned by transaction.
        Indicates whether coupon should be granted and for what amount. 
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BulkTransactionConfirmation'
    400MachineUnknown:
      description: Example response
      content:
        application/json:
          schema:
            $ref: models/ErrorMessage.yaml
          examples:
            machineUnknown:
              $ref: '#/components/examples/MachineUnknown'
    ConflictMessage:
      value:
        msg: Conflicting ID of the request.
        errorCode: 5
        path: <path of the request>
    200VoucherData:
      description: Response of Voucer Data. If Voucher was supplied in Transaction Body - Response will be empty
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/VoucherData'
              - $ref: null
    200OkBufferReturned:
      description: OK. Buffer returned
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VoucherBuffer'
  requestBodies:
    RedeemVoucher:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Voucher'
    MachineUpdate:
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/MachineUpdate'
              - $ref: '#/components/schemas/MachineUpdateConnected'
    RegisterMachine:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RegisterMachine'

  examples:
    MachineUnknown:
      values:
        msg: Machine doesn't belong to given DRS operator.
        errorCode: 8
        path: <path of the request>
