  /transaction:
    post:
      tags:
        - transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: models/Transaction.yaml
      summary: Post single Transaction
      description: Post single Transaction
      responses:
        '200':
          $ref: '#/components/responses/200VoucherData'
        '400':
          $ref: '#/components/responses/400MachineUnknown'
        '409':
          $ref: '#/components/responses/409Conflict'
        '422':
          description: Validation exception
      x-stoplight:
        id: sbyw8qv8u7gj8
  /transaction_copy:
    post:
      tags:
        - transaction
      summary: Register a return transaction
      description: >
        Accepts a packaging return transaction from a POS checkout or an RVM machine.

        **Business logic:**

        - Exactly one of the `cstId` or `rvmId` fields must be provided (XOR).
        - `cstId` means POS stand type, `rvmId` means RVM stand type.
        - The stand must exist in the database and be active.
        - `transactionStartTime` must be less than or equal to `transactionEndTime`.
        - `transactionEndTime` cannot be more than 5 minutes in the future.
        - The `value` field, if provided, must be greater than or equal to the calculated deposit sum.
        - If `value` is not provided, the system calculates it automatically.
        - The calculated value must be greater than 0.
        - The transaction `id` must be unique.

        **Voucher logic:**

        - If `voucher.id` is provided, `redeemed` and `redeemType` are required.
        - If `voucher.id` is not provided, `redeemed` and `redeemType` must be empty.
      operationId: postTransactionCopy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
            examples:
              rvm_new_voucher:
                summary: RVM transaction with new voucher
                value:
                  id: "497f6eca-6276-4993-bfeb-53cbbbba6f08"
                  rvmId: "313ba123-cb88-44be-98e6-0b326b105a2a"
                  totalAmount: 20
                  transactionStartTime: "2025-03-20T10:00:00Z"
                  transactionEndTime: "2025-03-20T10:05:00Z"
                  containers:
                    - ean: "20123123"
                      count: 15
                    - ean: "50999888"
                      count: 5
              pos_existing_voucher:
                summary: POS transaction with existing voucher
                value:
                  id: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
                  cstId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  posId: "POS-001"
                  value: 10.0
                  totalAmount: 20
                  transactionStartTime: "2025-03-20T11:00:00Z"
                  transactionEndTime: "2025-03-20T11:03:00Z"
                  voucher:
                    id: "VCH-001"
                    redeemed: true
                    redeemType: 0
                  containers:
                    - ean: "20123123"
                      count: 15
                    - ean: "50999888"
                      count: 5
      responses:
        '200':
          description: Transaction accepted, voucher issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoucherResponse'
              examples:
                success:
                  summary: Issued voucher
                  value:
                    id: "VCH-20250320-0042"
                    printType: 1
                    issuedAt: "2025-03-20T10:05:01Z"
                    validUntil: "2025-04-20T23:59:59Z"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no_active_stand:
                  summary: No active stand
                  value:
                    message: "No active stand or collection point found for provided rvmId"
                xor_violation:
                  summary: Both cstId and rvmId were provided
                  value:
                    message: "cstId and rvmId are mutually exclusive - provide only one"
                missing_stand_id:
                  summary: Neither cstId nor rvmId was provided
                  value:
                    message: "Either cstId or rvmId must be provided"
                invalid_time_order:
                  summary: StartTime later than EndTime
                  value:
                    message: "transactionStartTime cannot be greater than transactionEndTime"
                future_end_time:
                  summary: EndTime in the future
                  value:
                    message: "transactionEndTime cannot be in the future"
                value_too_low:
                  summary: Provided value lower than calculated deposit
                  value:
                    message: "Value 1.00 < min deposit sum 5.00"
                zero_value:
                  summary: No deposit-eligible EANs
                  value:
                    message: "Voucher value must be a positive number. Check if containers are valid for deposit."
                invalid_json:
                  summary: Invalid or empty body
                  value:
                    message: "Invalid or empty JSON body"
                dto_validation:
                  summary: DTO field validation error
                  value:
                    message: "Validation failed"
                    errors:
                      - id: "id must be a UUID"
        '502':
          description: Communication error with voucher service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                voucher_service_error:
                  summary: Voucher service unavailable or returned an error
                  value:
                    message: "Failed to communicate with Voucher Service: Voucher Service returned 503: Service Unavailable"
      x-stoplight:
        id: w4d3ap89vbhpf
